name: Check PHP Version

on:
  schedule:
    # Every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for PHP version changes
        id: check
        run: ./check_php_version.sh --check-only || echo "changes=true" >> "$GITHUB_OUTPUT"

      - name: Update and push
        if: steps.check.outputs.changes == 'true'
        run: |
          git config user.name "PHP Version Checker"
          git config user.email "bot@github-actions"
          ./check_php_version.sh --update

      - name: Verify CI configuration
        if: always()
        run: |
          LAST=$(git log -1 --format=%ct)
          THRESHOLD=$(( $(date +%s) - 3888000 ))
          if [ "$LAST" -lt "$THRESHOLD" ]; then
            git config user.name "GitHub Actions Bot"
            git config user.email "actions@github.com"
            git commit --allow-empty -m "ci: refresh workflow configuration"
            git push
          fi
